[images]
  remote_images = ["https://source.unsplash.com/.*", "https://images.unsplash.com/.*", "https://ext.same-assets.com/.*", "https://ugc.same-assets.com/.*", "https://upload.wikimedia.org/.*"]

[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirect Netlify subdomain to custom domain
[[redirects]]
  from = "https://fameticker.netlify.app/*"
  to = "https://fameticker.news/:splat"
  status = 301
  force = true

# www to apex
[[redirects]]
  from = "https://www.fameticker.news/*"
  to = "https://fameticker.news/:splat"
  status = 301
  force = true

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
